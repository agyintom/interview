name: Local K8s CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          source shell/script.sh
          log_message "Starting Docker build..."
          docker build -t 192.168.178.115:5000/mynginx:${{ github.sha }} .
          log_message "Build finished."

      - name: Push
        run: |
          source shell/script.sh
          log_message "Pushing to local registry..."
          docker push 192.168.178.115:5000/mynginx:${{ github.sha }}
          log_message "Push successful."

      - name: Deploy
        run: |
          source shell/script.sh
          log_message "Updating K8s image to ${{ github.sha }}..."
          
          # Pre-pull image into k8s.io namespace on each worker node
          ssh k8s-node02 "sudo ctr -n k8s.io images pull --plain-http \
            192.168.178.115:5000/mynginx:${{ github.sha }}"
          
          kubectl set image deployment/my-nginx \
            my-nginx=192.168.178.115:5000/mynginx:${{ github.sha }}
          
          kubectl rollout status deployment/my-nginx
          log_message "Rollout complete!"

      - name: Post-Cleanup
        if: always()
        run: |
          source shell/script.sh
          log_message "Cleaning up local build image..."
          docker rmi 192.168.178.115:5000/mynginx:${{ github.sha }} || true

