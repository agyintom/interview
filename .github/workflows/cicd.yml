name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: mynginx

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mynginx:${{ github.sha }} .

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mynginx:${{ github.sha }}

      - name: Save Image Tag
        run: |
          echo "IMAGE=${{ secrets.DOCKER_USERNAME }}/mynginx:${{ github.sha }}" >> $GITHUB_ENV

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Update Deployment
        run: |
          kubectl set image deployment/my-nginx \
          my-nginx=${{ secrets.DOCKER_USERNAME }}/mynginx:${{ github.sha }}

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/my-nginx
