name: Local K8s CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          docker build -t 192.168.178.115:5000/mynginx:${{ github.sha }} .

      - name: Push
        run: |
          docker push 192.168.178.115:5000/mynginx:${{ github.sha }}

      - name: Deploy
        run: |
          kubectl set image deployment/my-nginx \
          my-nginx=192.168.178.115:5000/mynginx:${{ github.sha }}

      - name: Verify
        run: |
          kubectl rollout status deployment/my-nginx

      #  Clean up local images to save disk space on your runner
      - name: Post-Cleanup
        if: always()
        run: |
          docker rmi 192.168.178.115:5000/mynginx:${{ github.sha }} || true
