name: CI/CD

# Triggers on every push to main, and on semver tags (v1.2.3)
on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # needed to push the manifest patch commit and create releases

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  validate:
    runs-on: self-hosted   # runs on your local machine via a GitHub Actions runner
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile (hadolint)
        run: |
          docker run --rm -i hadolint/hadolint < Dockerfile

      - name: Validate k8s manifests (kubeval)
        run: |
          docker run --rm \
            -v "$(pwd)/k8s:/manifests" \
            ghcr.io/instrumenta/kubeval \
            /manifests/nginx.yaml

  # ── 2. Semver ─────────────────────────────────────────────────────────────────
  # Conventional commits drive the version bump:
  #   feat: → minor bump (0.X.0)
  #   fix:  → patch bump (0.0.X)
  #   BREAKING CHANGE → major bump (X.0.0)
  version:
    runs-on: self-hosted
    needs: validate
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed to compute the next version

      - name: Compute next semver
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "BREAKING CHANGE"
          minor_pattern: "^feat"
          version_format: "${major}.${minor}.${patch}"

  # ── 3. Build & load into local cluster ───────────────────────────────────────
  # For a local cluster we do NOT push to a remote registry.
  # Instead we build the image and load it directly into the cluster node(s).
  build:
    runs-on: self-hosted
    needs: version
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t myNginx:$VERSION .

      - name: Load image into kind cluster
        # If you use minikube, replace with: minikube image load myNginx:$VERSION
        # If you use k3s, replace with: k3s ctr images import <(docker save myNginx:$VERSION)
        run: kind load docker-image myNginx:$VERSION

  # ── 4. GitOps: patch the manifest and commit it back ─────────────────────────
  # The manifest in git is the single source of truth.
  # CI patches the image tag and commits; what's in git is what's in the cluster.
  gitops:
    runs-on: self-hosted
    needs: [version, build]
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch image tag in manifest
        run: sed -i "s|:APP_VERSION|:${VERSION}|g" k8s/nginx.yaml

      - name: Commit updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/nginx.yaml
          git diff --cached --quiet || \
            git commit -m "chore(k8s): bump image to ${VERSION} [skip ci]"
          git push

  # ── 5. Deploy ────────────────────────────────────────────────────────────────
  deploy:
    runs-on: self-hosted
    needs: [version, gitops]
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Apply manifest
        run: |
          sed "s|:APP_VERSION|:${VERSION}|g" k8s/nginx.yaml | kubectl apply -f -

      - name: Wait for rollout to complete
        run: kubectl rollout status deployment/myNginx --timeout=120s

  # ── 6. Tag & release with auto-changelog ─────────────────────────────────────
  release:
    runs-on: self-hosted
    needs: [version, deploy]
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: "Release v${{ env.VERSION }}"
          generate_release_notes: true   # auto-builds changelog from commits since last tag
