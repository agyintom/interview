name: Local K8s CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  REGISTRY: 192.168.178.115:5000
  IMAGE: mynginx
  DEPLOYMENT: my-nginx
  CONTAINER: my-nginx

jobs:
  build:
    name: Build Image
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          source shell/script.sh
          log_message "Building image ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}..."
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }} .
          log_message "Build complete."

  push:
    name: Push to Registry
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push image to local registry
        run: |
          source shell/script.sh
          log_message "Pushing ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}..."
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
          log_message "Push complete."

  pre-pull:
    name: Pre-pull on Nodes
    runs-on: self-hosted
    needs: push
    steps:
      - name: Pull image into k8s.io namespace on all nodes
        run: |
          source shell/script.sh
          for node in $(kubectl get nodes -o jsonpath='{.items[*].status.addresses[?(@.type=="InternalIP")].address}'); do
            log_message "Pre-pulling on node $node..."
            ssh -o StrictHostKeyChecking=no admin@$node \
              "sudo ctr -n k8s.io images pull --plain-http \
              ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}"
          done
          log_message "Pre-pull complete on all nodes."

  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: pre-pull
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update image tag in yaml and commit to Git
        run: |
          source shell/script.sh
          log_message "Setting image to ${{ github.sha }} in k8s/nginx.yaml..."
          sed -i "s|image: .*mynginx.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}|" k8s/nginx.yaml
          grep "image:" k8s/nginx.yaml

          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add k8s/nginx.yaml
          git diff --cached --quiet || git commit -m "ci: update image to ${{ github.sha }} [skip ci]"
          git push origin main
          log_message "Image tag committed to Git."

      - name: Apply manifest
        run: |
          source shell/script.sh
          log_message "Applying k8s/nginx.yaml..."
          kubectl apply -f k8s/nginx.yaml
          log_message "Manifest applied."

      - name: Wait for rollout
        run: |
          source shell/script.sh
          log_message "Waiting for rollout to complete..."
          kubectl rollout status deployment/${{ env.DEPLOYMENT }} --timeout=120s
          log_message "Rollout complete."

      - name: Verify pods are running
        run: |
          source shell/script.sh
          kubectl get pods -l app=${{ env.DEPLOYMENT }} -o wide
          log_message "Deployment verified."

  cleanup:
    name: Cleanup
    runs-on: self-hosted
    needs: deploy
    if: always()
    steps:
      - name: Remove local build image
        run: |
          source shell/script.sh
          log_message "Removing local image..."
          docker rmi ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }} || true
          log_message "Cleanup complete."
