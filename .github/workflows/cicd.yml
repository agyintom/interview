- name: Build
  run: |
    docker build -t mynginx:${{ github.sha }} .

- name: Export
  run: |
    docker save mynginx:${{ github.sha }} -o mynginx.tar

- name: Copy to Nodes
  run: |
    scp mynginx.tar node01:/tmp/
    scp mynginx.tar node02:/tmp/

- name: Import on Nodes
  run: |
    ssh node01 "sudo ctr -n k8s.io images import /tmp/mynginx.tar"
    ssh node02 "sudo ctr -n k8s.io images import /tmp/mynginx.tar"

- name: Rollout
  run: |
    kubectl rollout restart deployment my-nginx
