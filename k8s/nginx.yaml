---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myNginx
  labels:
    app: myNginx
spec:
  selector:
    matchLabels:
      app: myNginx          # was: myNgnx (typo in original)
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0     # zero-downtime deploys
  template:
    metadata:
      labels:
        app: myNginx        # was: myNgnx (typo in original)
    spec:
      containers:
        - name: myNginx
          image: ghcr.io/YOUR_ORG/interview:APP_VERSION   # replaced by CI
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 101
---
apiVersion: v1
kind: Service
metadata:
  name: myNginx
  labels:
    app: myNginx
spec:
  selector:
    app: myNginx
  ports:
    - port: 8080
      targetPort: 8080
