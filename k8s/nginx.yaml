---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myNginx
  labels:
    app: myNginx
spec:
  selector:
    matchLabels:
      app: myNginx
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # zero-downtime: new pod must be Ready before old is removed
  template:
    metadata:
      labels:
        app: myNginx           # BUG FIX: original had 'myNgnx' — typo broke selector match
    spec:
      containers:
        - name: myNginx
          image: myNginx:APP_VERSION   # replaced by CI via sed; local registry image
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101       # nginx user in official alpine image
---
apiVersion: v1
kind: Service
metadata:
  name: myNginx
  labels:
    app: myNginx
spec:
  type: NodePort             # accessible locally without a LoadBalancer controller
  selector:
    app: myNginx
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080        # reach at http://localhost:30080 on kind/minikube/k3s
    # reach at http://localhost:30080 on kind/minikube/k3s
